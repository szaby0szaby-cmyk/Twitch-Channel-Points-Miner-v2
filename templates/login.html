<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Bejelentkezés - Twitch Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0e0e10] flex items-center justify-center min-h-screen font-sans">
    <div class="bg-[#18181b] border border-[#303032] p-10 rounded-xl shadow-2xl w-96 text-center">
        <h2 class="text-3xl font-extrabold text-white mb-8">Jelentkezz be</h2>
        
        {% if error %}
            <div class="bg-red-500 bg-opacity-20 text-red-500 border border-red-500 rounded p-3 mb-6 text-sm font-semibold">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST" action="/login" class="flex flex-col gap-5">
            <input type="text" name="username" placeholder="Felhasználónév" required 
                class="p-3 bg-[#0e0e10] text-white border border-[#303032] rounded focus:outline-none focus:border-[#bf94ff] transition">
            <input type="password" name="password" placeholder="Jelszó" required 
                class="p-3 bg-[#0e0e10] text-white border border-[#303032] rounded focus:outline-none focus:border-[#bf94ff] transition">
            
            <button type="submit" 
                class="bg-[#bf94ff] text-black font-extrabold py-3 rounded-lg mt-4 hover:bg-[#a67ce6] transition duration-200 shadow-lg">
                Belépés
            </button>
        </form>
    </div>
</body>
</html>
